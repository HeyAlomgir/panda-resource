<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing page</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- tailwind -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="container mx-auto   space-y-16">

    <header>
        <nav class="flex justify-between space-y-16 ">
            <img src="./assets/logo.png" alt="">
            <img src="./assets/menu-bar.png" alt="">
        </nav>


        <section class=" flex flex-col md:flex-row items-center justify-between bg-[#FFEAE9] rounded-2xl p-4 m-4 ">
            

            <div class="flex-1 space-y-4">
            <h2 class="text-4xl font-bold">Mi LED TV 4A PRO 32</h2>
            <p class="text-[#4E4E4E]">Amet minim mollit non deserunt ullamco est sit aliqua dolor <br> do amet sint. Velit officia consequat duis enim velit mollit. <br> Exercitation veniam consequat sunt nostrud amet.</p>

            <h4 class="text-2xl font-semibold text-[#FF136F]">$1289</h4>

            <button class="bg-[#FF2E6D] p-3 rounded-2xl text-white">BUY NOW</button>
            </div>


            <div class="flex-1" >
                <img class="w-full" src="./assets/hero-tv.png" alt="">
            </div>
        </section>
    </header>

    <section>

        <h2 class="font-bold text-black text-2xl mb-8">Categories</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 m-4">

            <div class="bg-gradient-to-r from-[#FFA34F] to-[#FF7020] flex items-center justify-between  p-4 rounded-2xl">
                <h3 class="text-white font-bold">Watch</h3>
                <img src="./assets/category-watch.png" alt="">
            </div>

            <div class="bg-gradient-to-r from-[#FF589B] to-[#FF136F] flex items-center justify-between  p-4 rounded-2xl">
                <h3 class="text-white font-bold">Bag</h3>
                <img src="./assets/category-bag.png" alt="">
            </div>

            <div class="bg-gradient-to-r from-[#4242FF] to-[#7D15FF]
 flex items-center justify-between  p-4 rounded-2xl">
                <h3 class="text-white font-bold">Shoes</h3>
                <img src="./assets/category-shoe.png" alt="">
            </div>

            

        </div>
    </section>

   
</body>
</html>
